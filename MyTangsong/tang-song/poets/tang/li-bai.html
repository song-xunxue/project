    <main>
        <h1>李白的诗篇</h1>
        <article>
            <h3>静夜思</h3>
            <p class="poem">床前明月光，疑是地上霜。<br>
               举头望明月，低头思故乡。</p>
        </article>
        <article>
            <h3>将进酒</h3>
            <p class="poem">君不见，黄河之水天上来，奔流到海不复回。<br>
               君不见，高堂明镜悲白发，朝如青丝暮成雪。<br>
               人生得意须尽欢，莫使金樽空对月。<br>
               天生我材必有用，千金散尽还复来。</p>
        </article>
        <article>
            <h3>早发白帝城</h3>
            <p class="poem">朝辞白帝彩云间，千里江陵一日还。<br>
               两岸猿声啼不住，轻舟已过万重山。</p>
        </article>
        <article>
            <h3>黄鹤楼送孟浩然之广陵</h3>
            <p class="poem">故人西辞黄鹤楼，烟花三月下扬州。<br>
               孤帆远影碧空尽，唯见长江天际流。</p>
        </article>
