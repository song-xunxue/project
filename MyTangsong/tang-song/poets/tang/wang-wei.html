    <main>
        <h1>王维的诗篇</h1>
        <article>
            <h3>山居秋暝</h3>
            <p class="poem">空山新雨后，天气晚来秋。<br>
               明月松间照，清泉石上流。<br>
               竹喧归浣女，莲动下渔舟。<br>
               随意春芳歇，王孙自可留。</p>
        </article>
        <article>
            <h3>送元二使安西</h3>
            <p class="poem">渭城朝雨浥轻尘，客舍青青柳色新。<br>
               劝君更尽一杯酒，西出阳关无故人。</p>
        </article>
        <article>
            <h3>九月九日忆山东兄弟</h3>
            <p class="poem">独在异乡为异客，每逢佳节倍思亲。<br>
               遥知兄弟登高处，遍插茱萸少一人。</p>
        </article>
        <article>
            <h3>鹿柴</h3>
            <p class="poem">空山不见人，但闻人语响。<br>
               返景入深林，复照青苔上。</p>
        </article>
