            <p>
                宋代，词作渐成新风，别开生面。苏轼豁达超逸，李清照婉约深情，辛弃疾激昂豪迈——他们以词抒怀，以句寄意，将语言的艺术推向了新的境界。宋词兼有婉约与豪放的双重气质，情致绵长，意境悠远，成为中国文学史上一道不可忽视的风景，至今仍令人陶醉其中，感怀不已。
            </p>
